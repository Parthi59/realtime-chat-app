<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 20px auto; }
    #chat { border: 1px solid #ccc; height: 320px; overflow-y: auto; padding: 10px; }
    input, button { padding: 10px; margin-top: 8px; width: 100%; }
  </style>
</head>
<body>
  <h2>Real-Time Chat ✅</h2>

  <div id="authBox">
    <input id="username" placeholder="username" />
    <input id="password" placeholder="password" type="password" />
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <div id="chatBox" style="display:none;">
    <div id="chat"></div>
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMsg()">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let token = "";
    let socket;
    const chat = document.getElementById("chat");

    function addMessage(m) {
      const div = document.createElement("div");
      div.textContent = `${m.username}: ${m.text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function register() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      alert(data.message);
    }

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (!data.token) return alert(data.message);

      token = data.token;

      document.getElementById("authBox").style.display = "none";
      document.getElementById("chatBox").style.display = "block";

      // Load history (JWT)
      const historyRes = await fetch("/messages", {
        headers: { "Authorization": "Bearer " + token }
      });
      const history = await historyRes.json();
      history.forEach(addMessage);

      socket = io({ auth: { token } });
      socket.on("chatMessage", addMessage);
    }

    function sendMsg() {
      const text = document.getElementById("msg").value;
      if (!text) return;
      socket.emit("chatMessage", { text });
      document.getElementById("msg").value = "";
    }
  </script>
</body>
</html>
